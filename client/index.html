<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL WASTELAND</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <style>
        body { background-color: #000; margin: 0; padding: 10px; overflow: hidden; height: 100vh; box-sizing: border-box; }
        #terminal-container { width: 100%; height: 100%; }
        .xterm-viewport { overflow-y: auto !important; }
        .xterm-rows { font-family: 'Courier New', Courier, monospace !important; }
    </style>
</head>
<body>
    <div id="terminal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script>
        const term = new Terminal({
            theme: { background: '#000000', foreground: '#00FF00', cursor: '#00FF00', selectionBackground: 'rgba(0, 255, 0, 0.3)' },
            cursorBlink: true, fontFamily: "'Courier New', Courier, monospace", fontSize: 16, convertEol: true
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit(); 
        window.addEventListener('resize', () => fitAddon.fit());
        term.focus();

        const socket = io(); 

        socket.on('output', (data) => {
            term.write(data); 
            term.scrollToBottom(); 
        });

        // --- SISTEMA DE INPUT AVANÇADO ---
        let currentInput = '';
        let commandHistory = [];
        let historyIndex = 0;
        let cursorPosition = 0; 

        term.onData(e => {
            if (e === '\r') {
                socket.emit('command', currentInput);
                
                if (currentInput.trim() !== '') {
                    commandHistory = commandHistory.filter(cmd => cmd !== currentInput);
                    commandHistory.push(currentInput);
                    if (commandHistory.length > 3) commandHistory.shift();
                }
                
                historyIndex = commandHistory.length;
                currentInput = '';
                cursorPosition = 0;
            } 
            else if (e === '\u007F') {
                if (cursorPosition > 0) {
                   
                    const prefixo = currentInput.slice(0, cursorPosition - 1);
                    const sufixo = currentInput.slice(cursorPosition);
                    currentInput = prefixo + sufixo;
                    cursorPosition--;
                    
                    
                    term.write('\b\x1b[K' + sufixo);
                    for (let i = 0; i < sufixo.length; i++) term.write('\x1b[D');
                }
            } 
            else if (e === '\x1b[D') { 
                if (cursorPosition > 0) {
                    cursorPosition--;
                    term.write(e); 
                }
            }
            else if (e === '\x1b[C') { 
                if (cursorPosition < currentInput.length) {
                    cursorPosition++;
                    term.write(e); 
                }
            }
            else if (e === '\x1b[A') { 
                if (commandHistory.length > 0 && historyIndex > 0) {
                   
                    for (let i = cursorPosition; i < currentInput.length; i++) term.write('\x1b[C');
                    for (let i = 0; i < currentInput.length; i++) term.write('\b \b');
                    
                    historyIndex--;
                    currentInput = commandHistory[historyIndex];
                    cursorPosition = currentInput.length;
                    term.write(currentInput);
                }
            } 
            else if (e === '\x1b[B') { 
                if (historyIndex < commandHistory.length) {
                    for (let i = cursorPosition; i < currentInput.length; i++) term.write('\x1b[C');
                    for (let i = 0; i < currentInput.length; i++) term.write('\b \b');
                    
                    historyIndex++;
                    if (historyIndex === commandHistory.length) {
                        currentInput = '';
                    } else {
                        currentInput = commandHistory[historyIndex];
                        term.write(currentInput);
                    }
                    cursorPosition = currentInput.length;
                }
            } 
            else { 
                if (e >= String.fromCharCode(0x20) && e <= String.fromCharCode(0x7E)) {
                   
                    const prefixo = currentInput.slice(0, cursorPosition);
                    const sufixo = currentInput.slice(cursorPosition);
                    currentInput = prefixo + e + sufixo;
                    cursorPosition++;
                    
                    
                    term.write(e + sufixo);
                    for (let i = 0; i < sufixo.length; i++) {
                        term.write('\x1b[D');
                    }
                }
            }
        });
    </script>
</body>
</html>
